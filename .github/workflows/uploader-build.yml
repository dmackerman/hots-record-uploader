name: Uploader — Build Check

# Runs on every push and PR to confirm the Electron app compiles.
# Does NOT publish a release. See uploader-release.yml for that.

on:
  push:
    paths:
      - 'src/**'
      - 'package.json'
      - 'forge.config.js'
      - 'webpack.*.js'
      - 'tsconfig.json'
      - '.github/workflows/uploader-build.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'package.json'
      - 'forge.config.js'
      - 'webpack.*.js'
      - 'tsconfig.json'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (make)
        run: npm run make
        env:
          # Forge needs this for the DMG maker on macOS
          SKIP_NOTARIZE: true
